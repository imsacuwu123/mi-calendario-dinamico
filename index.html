<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario Dinámico</title>
    
    <style>
        /* --- ESTILOS VISUALES (CSS) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .calendario-contenedor {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            padding: 25px;
            box-sizing: border-box;
        }

        .cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .cabecera button {
            background-color: #f0f0f0;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cabecera button:hover {
            background-color: #9face6;
            color: white;
            transform: scale(1.1);
        }

        select {
            border: 1px solid #ddd;
            background-color: #fafafa;
            color: #333;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
            padding: 5px; 
            font-size: 16px;
        }

        select:hover {
            border-color: #9face6;
        }

        .dias-semana {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .cuadricula-dias {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .dia {
            padding: 10px 0;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            color: #444;
            transition: all 0.2s ease;
            min-height: 40px; 
        }

        .dia:hover {
            background: #74ebd5;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 4px 8px rgba(116, 235, 213, 0.4);
        }

        /* --- ESTILOS DE LA AGENDA Y COLORES --- */
        .nota-dia {
            font-size: 10px;
            margin-top: 5px;
            padding: 2px 4px;
            border-radius: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: bold;
        }

        /* Las nuevas categorías de colores */
        .nota-otro { background-color: #ffeb3b; color: #333; }
        .nota-urgente { background-color: #ff4d4d; color: white; }
        .nota-trabajo { background-color: #4da6ff; color: white; }
        .nota-personal { background-color: #4dff4d; color: #333; }

        .modal-fondo {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-contenido {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 80px;
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn-modal {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-cancelar { background: #ff4d4d; color: white; }
        .btn-guardar { background: #74ebd5; color: #333; }
    </style>
</head>
<body>

    <div class="calendario-contenedor">
        <div class="cabecera">
            <button id="btn-anterior"><</button>
            <div style="display: flex; gap: 10px;">
                <select id="selector-mes"></select>
                <select id="selector-anio"></select>
            </div>
            <button id="btn-siguiente">></button>
        </div>

        <div class="dias-semana">
            <div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div>
        </div>

        <div class="cuadricula-dias" id="dias"></div>
    </div>

    <div id="modal-recordatorio" class="modal-fondo">
        <div class="modal-contenido">
            <h3 id="titulo-fecha">Agregar Recordatorio</h3>
            
            <select id="categoria-recordatorio" style="width: 100%; margin-top: 10px; margin-bottom: 5px; padding: 5px; border-radius: 5px;">
                <option value="otro">Amarillo (General)</option>
                <option value="urgente">Rojo (Urgente)</option>
                <option value="trabajo">Azul (Trabajo)</option>
                <option value="personal">Verde (Personal)</option>
            </select>

            <textarea id="texto-recordatorio" placeholder="Ej: Cita con el dentista a las 4pm..."></textarea>
            
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <button id="btn-cerrar" class="btn-modal btn-cancelar">Cancelar</button>
                <button id="btn-guardar" class="btn-modal btn-guardar">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        
        let fechaActual = new Date();
        let mesActual = fechaActual.getMonth();
        let anioActual = fechaActual.getFullYear();

        const diasContenedor = document.getElementById("dias");
        const selectorMes = document.getElementById("selector-mes");
        const selectorAnio = document.getElementById("selector-anio");
        const btnAnterior = document.getElementById("btn-anterior");
        const btnSiguiente = document.getElementById("btn-siguiente");
        
        // Elementos de la ventana emergente
        const modal = document.getElementById("modal-recordatorio");
        const textoRecordatorio = document.getElementById("texto-recordatorio");
        const tituloFecha = document.getElementById("titulo-fecha");
        const selectorCategoria = document.getElementById("categoria-recordatorio");
        const btnCerrar = document.getElementById("btn-cerrar");
        const btnGuardar = document.getElementById("btn-guardar");

        // Memoria de la agenda
        let agenda = JSON.parse(localStorage.getItem("misRecordatorios")) || {};
        let diaSeleccionadoParaNota = null;

        // Llenar selectores
        meses.forEach((nombreMes, indice) => {
            let opcion = document.createElement("option");
            opcion.value = indice;
            opcion.textContent = nombreMes;
            selectorMes.appendChild(opcion);
        });

        for (let i = anioActual - 10; i <= anioActual + 10; i++) {
            let opcion = document.createElement("option");
            opcion.value = i;
            opcion.textContent = i;
            selectorAnio.appendChild(opcion);
        }

        // Función principal que dibuja y colorea
        function dibujarCalendario(mes, anio) {
            diasContenedor.innerHTML = "";
            selectorMes.value = mes;
            selectorAnio.value = anio;

            let primerDiaDelMes = new Date(anio, mes, 1).getDay();
            let diasEnElMes = new Date(anio, mes + 1, 0).getDate();

            for (let i = 0; i < primerDiaDelMes; i++) {
                let espacioVacio = document.createElement("div");
                diasContenedor.appendChild(espacioVacio);
            }

            for (let i = 1; i <= diasEnElMes; i++) {
                let cajitaDia = document.createElement("div");
                cajitaDia.className = "dia";
                cajitaDia.textContent = i;

                let claveFecha = `${anio}-${mes}-${i}`;

                // Evaluar y pintar la nota si existe
                if (agenda[claveFecha]) {
                    let datoNota = agenda[claveFecha];
                    let textoNota = typeof datoNota === 'string' ? datoNota : datoNota.texto;
                    let categoriaNota = typeof datoNota === 'string' ? 'otro' : datoNota.categoria;

                    let notaVisual = document.createElement("div");
                    notaVisual.className = `nota-dia nota-${categoriaNota}`;
                    notaVisual.textContent = textoNota;
                    cajitaDia.appendChild(notaVisual);
                }

                // Abrir agenda al hacer clic
                cajitaDia.addEventListener("click", () => {
                    diaSeleccionadoParaNota = claveFecha;
                    abrirModal(i, mes, anio, agenda[claveFecha]);
                });

                diasContenedor.appendChild(cajitaDia);
            }
        }

        // Navegación rápida
        btnAnterior.addEventListener("click", () => {
            mesActual--;
            if (mesActual < 0) { mesActual = 11; anioActual--; }
            dibujarCalendario(mesActual, anioActual);
        });

        btnSiguiente.addEventListener("click", () => {
            mesActual++;
            if (mesActual > 11) { mesActual = 0; anioActual++; }
            dibujarCalendario(mesActual, anioActual);
        });

        selectorMes.addEventListener("change", (evento) => {
            mesActual = parseInt(evento.target.value);
            dibujarCalendario(mesActual, anioActual);
        });

        selectorAnio.addEventListener("change", (evento) => {
            anioActual = parseInt(evento.target.value);
            dibujarCalendario(mesActual, anioActual);
        });

        // Lógica de la ventana emergente y guardado de categorías
        function abrirModal(dia, mes, anio, datoExistente) {
            tituloFecha.textContent = `Nota para: ${dia} de ${meses[mes]}`;
            
            let texto = typeof datoExistente === 'string' ? datoExistente : (datoExistente ? datoExistente.texto : "");
            let cat = typeof datoExistente === 'string' ? 'otro' : (datoExistente ? datoExistente.categoria : "otro");

            textoRecordatorio.value = texto;
            selectorCategoria.value = cat; 
            modal.style.display = "flex";
        }

        btnCerrar.addEventListener("click", () => {
            modal.style.display = "none";
        });

        btnGuardar.addEventListener("click", () => {
            let textoEscrito = textoRecordatorio.value.trim();
            let categoriaElegida = selectorCategoria.value;

            if (textoEscrito === "") {
                delete agenda[diaSeleccionadoParaNota];
            } else {
                agenda[diaSeleccionadoParaNota] = {
                    texto: textoEscrito,
                    categoria: categoriaElegida
                };
            }
            
            localStorage.setItem("misRecordatorios", JSON.stringify(agenda));
            modal.style.display = "none";
            dibujarCalendario(mesActual, anioActual);
        });

        // Iniciar todo
        dibujarCalendario(mesActual, anioActual);

    </script>
</body>
</html>
